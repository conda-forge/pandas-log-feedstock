{% set name = "pandas-log" %}
{% set version = "0.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pandas-log-{{ version }}.tar.gz
  sha256: 6b8ee33608060fbb3f865d4acbbfb24ce1abbcd9d43b26c16bcd82ee62c642c4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - pytest-runner
    - python {{ python_min }}
    - setuptools
  run:
    - humanize >=0.5.0
    - pandas >=0.25.1
    - pandas-flavor >=0.1.2
    - python >={{ python_min }}

test:
  imports:
    - pandas_log
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/eyaltrabelsi/pandas-log
  doc_url: https://pandas-log.readthedocs.io/en/latest/
  summary: Provides feedback about basic pandas operations
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - thewchan
